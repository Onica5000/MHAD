<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MHAD — Design</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #f0eee9; font-family: 'DM Sans', system-ui, sans-serif; }
    #root { height: 100%; }
    /* default body text rendering */
    body { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
    /* Reset for our React-rendered card content (counter the dc-card *::-webkit-scrollbar trick is fine) */
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="browser-window.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>

  <script type="text/babel" src="ds.jsx"></script>
  <script type="text/babel" src="flow.jsx"></script>
  <script type="text/babel" src="mobile.jsx"></script>
  <script type="text/babel" src="web.jsx"></script>

  <script type="text/babel" data-presets="react">
    const { useState } = React;

    // Tweakable defaults (palette + mode + density). Persisted by host.
    const DEFAULTS = /*EDITMODE-BEGIN*/{
      "palette": "navy",
      "mode": "light",
      "density": "comfortable"
    }/*EDITMODE-END*/;

    function App() {
      const [t, setTweak] = useTweaks(DEFAULTS);

      // Resolve palette from the design system
      const p = MHAD_PALETTES[t.palette][t.mode];

      return (
        <MHADContext.Provider value={{ palette: p, paletteName: t.palette, mode: t.mode, density: t.density }}>
          <DesignCanvas>

            <DCSection id="cover" title="MHAD · Redesign" subtitle="Bolder editorial direction · plain-language wizard · mobile + web · v1">
              <DCArtboard id="brief" label="Design brief" width={780} height={520}>
                <BriefCard />
              </DCArtboard>
              <DCArtboard id="system" label="Visual system" width={780} height={520}>
                <SystemCard />
              </DCArtboard>
            </DCSection>

            <DCSection id="flow" title="The wizard, reorganized" subtitle="15 steps → 9 steps. Same legal coverage, fewer screens, logical order.">
              <DCArtboard id="before-after" label="Before / After" width={1180} height={620}>
                <FlowDiagram />
              </DCArtboard>
            </DCSection>

            <DCSection id="mobile" title="Mobile · iOS" subtitle="Primary surface. Most users will draft on their phone.">
              <DCArtboard id="m-welcome" label="01 · Welcome" width={422} height={894}><Mobile name="welcome" /></DCArtboard>
              <DCArtboard id="m-mode" label="02 · Mode" width={422} height={894}><Mobile name="mode" /></DCArtboard>
              <DCArtboard id="m-disclaimer" label="03 · Disclaimer" width={422} height={894}><Mobile name="disclaimer" /></DCArtboard>
              <DCArtboard id="m-home" label="04 · Home" width={422} height={894}><Mobile name="home" /></DCArtboard>
              <DCArtboard id="m-formtype" label="05 · Form type" width={422} height={894}><Mobile name="formtype" /></DCArtboard>
              <DCArtboard id="m-wizard-about" label="06 · Wizard · About you" width={422} height={894}><Mobile name="wizard-about" /></DCArtboard>
              <DCArtboard id="m-wizard-people" label="07 · Wizard · People I trust" width={422} height={894}><Mobile name="wizard-people" /></DCArtboard>
              <DCArtboard id="m-wizard-procedures" label="08 · Wizard · Procedures" width={422} height={894}><Mobile name="wizard-procedures" /></DCArtboard>
              <DCArtboard id="m-review" label="09 · Review" width={422} height={894}><Mobile name="review" /></DCArtboard>
              <DCArtboard id="m-sign" label="10 · Sign & witness" width={422} height={894}><Mobile name="sign" /></DCArtboard>
              <DCArtboard id="m-done" label="11 · Done + wallet" width={422} height={894}><Mobile name="done" /></DCArtboard>
              <DCArtboard id="m-crisis" label="12 · Crisis sheet" width={422} height={894}><Mobile name="crisis" /></DCArtboard>
            </DCSection>

            <DCSection id="web" title="Web · Desktop" subtitle="Same flow, denser. For users who prefer a keyboard.">
              <DCArtboard id="w-home" label="Dashboard" width={1200} height={780}><Web name="dashboard" /></DCArtboard>
              <DCArtboard id="w-wizard" label="Wizard · People I trust (desktop)" width={1200} height={780}><Web name="wizard" /></DCArtboard>
              <DCArtboard id="w-export" label="Export · PDF preview" width={1200} height={780}><Web name="export" /></DCArtboard>
              <DCArtboard id="w-learn" label="Learn hub" width={1200} height={780}><Web name="learn" /></DCArtboard>
              <DCArtboard id="w-ai" label="AI assistant" width={1200} height={780}><Web name="ai" /></DCArtboard>
            </DCSection>

          </DesignCanvas>

          <TweaksPanel title="Tweaks" defaultOpen={false}>
            <TweakSection title="Palette">
              <TweakRadio
                value={t.palette}
                onChange={(v) => setTweak('palette', v)}
                options={[
                  { value: 'teal', label: 'Warm Teal' },
                  { value: 'navy', label: 'Deep Navy' },
                  { value: 'sage', label: 'Sage' },
                ]}
              />
            </TweakSection>
            <TweakSection title="Mode">
              <TweakRadio
                value={t.mode}
                onChange={(v) => setTweak('mode', v)}
                options={[
                  { value: 'light', label: 'Light' },
                  { value: 'dark', label: 'Dark' },
                ]}
              />
            </TweakSection>
            <TweakSection title="Density">
              <TweakRadio
                value={t.density}
                onChange={(v) => setTweak('density', v)}
                options={[
                  { value: 'comfortable', label: 'Comfortable' },
                  { value: 'compact', label: 'Compact' },
                ]}
              />
            </TweakSection>
          </TweaksPanel>
        </MHADContext.Provider>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
