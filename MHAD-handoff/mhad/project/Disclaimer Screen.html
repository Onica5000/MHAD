<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MHAD — Initial Disclaimer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    html, body { margin: 0; padding: 0; min-height: 100%; background: #f0eee9; font-family: 'DM Sans', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
    #root { min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 40px 24px; gap: 40px; flex-wrap: wrap; }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="ds.jsx"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    const { useState } = React;

    // ─── Sections ────────────────────────────────────────────────────────
    // Lifted from lib/ui/disclaimer/disclaimer_screen.dart — same legal copy,
    // tightened for screen reading.
    const SECTIONS = [
      {
        n: '01',
        title: 'Not legal or medical advice',
        body: (
          <>
            <p>This app helps Pennsylvania residents document their treatment preferences under <strong>PA Act 194 of 2004</strong>. The information is for informational purposes only and does <strong>not</strong> constitute legal or medical advice.</p>
            <p>It is not a medical device. It does not diagnose, treat, cure, or prevent any condition. For treatment decisions, consult a qualified mental health professional. For legal questions, consult a licensed PA attorney.</p>
          </>
        ),
      },
      {
        n: '02',
        title: 'No professional relationship',
        body: (
          <>
            <p>Use of this app does <strong>not</strong> create an attorney–client relationship, a provider–patient relationship, or any other professional relationship between you and the developer.</p>
            <p>You are solely responsible for making sure your directive meets all legal requirements under PA law, including proper execution with witnesses.</p>
          </>
        ),
      },
      {
        n: '03',
        title: 'No warranty',
        body: (
          <p>This app is provided <em>"as is"</em> without warranty of any kind. The developer assumes no liability for damages arising from use of the app or any document created with it, and is not responsible for ensuring the legal validity of any directive.</p>
        ),
      },
      {
        n: '04',
        title: 'Requirements for a valid directive',
        body: (
          <>
            <p>A PA Mental Health Advance Directive is legally valid <strong>only</strong> when:</p>
            <ul>
              <li>You (the principal) have legal capacity at the time of signing</li>
              <li>It is signed in the presence of <strong>two adult witnesses</strong></li>
              <li>Both witnesses meet eligibility requirements under Act 194</li>
            </ul>
            <p><strong>Witnesses cannot be:</strong> your designated agent, your agent's spouse, your mental health care provider, or an employee of your treatment facility (unless related to you).</p>
            <p>This app captures touch-drawn signatures for convenience during preparation. The <strong>printed</strong> directive must be signed in original ink, in the presence of your two witnesses, to be legally valid.</p>
          </>
        ),
      },
      {
        n: '05',
        title: 'Two-year validity',
        body: (
          <p>Under PA Act 194, an MHAD is valid for <strong>two years</strong> from the date of execution unless revoked earlier. This app will remind you when your directive is approaching expiration.</p>
        ),
      },
      {
        n: '06',
        title: 'Revocation',
        body: (
          <>
            <p>You may revoke this directive at any time while you have legal capacity by:</p>
            <ul>
              <li>Notifying your healthcare provider or agent in writing</li>
              <li>Destroying the directive</li>
              <li>Executing a new directive</li>
            </ul>
            <p>Notify everyone who has copies of the revocation.</p>
          </>
        ),
      },
      {
        n: '07',
        title: 'Privacy & AI features',
        body: (
          <>
            <p>In <strong>Private Mode</strong>, your directive is encrypted and stored on this device. In <strong>Public Mode</strong> (or on the web), data is held in memory only and is not saved permanently. This app is <strong>not</strong> HIPAA-compliant.</p>
            <p>If you use the optional AI Assistant (Google Gemini), text you send is transmitted to Google's servers. On the free tier, Google may use this data to improve their products and human reviewers may read inputs. <strong>Do not include personally identifying information</strong> (full name, SSN, date of birth, address) in AI requests.</p>
            <p>AI suggestions are not legal or medical advice — review carefully before accepting.</p>
          </>
        ),
      },
      {
        n: '08',
        title: 'Resources & assistance',
        body: (
          <ul style={{ listStyle: 'none', padding: 0 }}>
            <li><strong>PA Protection &amp; Advocacy</strong> — your rights under Act 194<br/><span className="mono">1-800-692-7443 · TDD/TTY 1-877-375-7139</span></li>
            <li style={{ marginTop: 8 }}><strong>PA Mental Health Consumers' Association</strong><br/><span className="mono">1-800-887-6422</span></li>
            <li style={{ marginTop: 8 }}><strong>Mental Health Association in Pennsylvania</strong><br/><span className="mono">1-866-578-3659</span></li>
            <li style={{ marginTop: 8 }}><strong>988 Suicide &amp; Crisis Lifeline</strong> — 24/7, free, confidential<br/><span className="mono">Call or text 988</span></li>
          </ul>
        ),
      },
    ];

    // ─── Section block ────────────────────────────────────────────────────
    function Section({ section, expanded, onToggle, index, total }) {
      const { palette: p } = React.useContext(MHADContext);
      return (
        <div style={{
          background: p.card,
          border: `1px solid ${expanded ? p.primary + '40' : p.border}`,
          borderRadius: 14,
          overflow: 'hidden',
          marginBottom: 8,
        }}>
          <button onClick={onToggle} style={{
            width: '100%', background: 'transparent', border: 'none', padding: '14px 14px',
            display: 'flex', alignItems: 'center', gap: 12, cursor: 'pointer',
            textAlign: 'left', fontFamily: SANS,
          }}>
            <span style={{
              fontFamily: SERIF, fontStyle: 'italic', fontSize: 24, fontWeight: 400,
              color: p.primary, width: 30, lineHeight: 1, marginTop: 2,
              letterSpacing: -0.5,
            }}>{section.n}</span>
            <span style={{ flex: 1, fontSize: 15, fontWeight: 700, color: p.text, letterSpacing: -0.1 }}>
              {section.title}
            </span>
            <ChevD size={18} stroke={p.textMuted} style={{
              transform: expanded ? 'rotate(180deg)' : 'rotate(0)',
              transition: 'transform 0.2s',
            }} />
          </button>
          {expanded && (
            <div style={{
              padding: '0 18px 16px 56px',
              fontSize: 13.5, color: p.textMuted, lineHeight: 1.55,
            }}>
              <style>{`
                .disc-body p { margin: 0 0 8px; }
                .disc-body p:last-child { margin-bottom: 0; }
                .disc-body ul { margin: 6px 0 10px; padding-left: 18px; }
                .disc-body li { margin-bottom: 4px; }
                .disc-body strong { color: ${p.text}; font-weight: 600; }
                .disc-body em { font-style: italic; }
                .disc-body .mono { font-family: ${MONO}; font-size: 12px; color: ${p.text}; }
              `}</style>
              <div className="disc-body">{section.body}</div>
            </div>
          )}
        </div>
      );
    }

    // ─── The actual disclaimer screen ────────────────────────────────────
    function DisclaimerScreen() {
      const { palette: p } = React.useContext(MHADContext);
      const [open, setOpen] = useState(0);   // first section expanded by default
      const [read, setRead] = useState([0]); // sections the user has expanded
      const [isAdult, setIsAdult] = useState(false);
      const [notLegal, setNotLegal] = useState(false);

      const toggle = (i) => {
        setOpen(open === i ? -1 : i);
        if (!read.includes(i)) setRead([...read, i]);
      };

      const readPct = Math.round((read.length / SECTIONS.length) * 100);
      const allRead = read.length === SECTIONS.length;
      const canContinue = isAdult && notLegal;

      return (
        <Screen scroll={false}>
          {/* Top: hairline crisis link, very subtle */}
          <div style={{
            position: 'absolute', top: 64, right: 16, zIndex: 5,
          }}>
            <span style={{
              fontSize: 11, fontWeight: 600, color: p.crisisAccent,
              background: p.crisisBg, padding: '5px 10px', borderRadius: 100,
              border: `1px solid ${p.crisisBorder}`,
              display: 'inline-flex', alignItems: 'center', gap: 5,
            }}>
              <Phone size={11} /> Need 988
            </span>
          </div>

          {/* Scrollable content area */}
          <div style={{
            paddingTop: 80,
            height: '100%',
            display: 'flex', flexDirection: 'column',
          }}>
            {/* Editorial header */}
            <div style={{ padding: '0 22px 14px' }}>
              <SectionLabel>Before we begin</SectionLabel>
              <h1 style={{
                fontFamily: SERIF, fontStyle: 'italic', fontSize: 44,
                lineHeight: 0.98, letterSpacing: -1, fontWeight: 400,
                margin: '6px 0 8px', color: p.text,
              }}>
                A few <span style={{ color: p.primary }}>important</span> things.
              </h1>
              <p style={{
                fontSize: 14, color: p.textMuted, margin: 0, lineHeight: 1.5,
                maxWidth: 340,
              }}>
                Read carefully — these confirm what this app does and doesn't do under <strong style={{ color: p.text, fontWeight: 600 }}>PA Act 194</strong>.
              </p>

              {/* Progress micro-meter */}
              <div style={{
                marginTop: 14, display: 'flex', alignItems: 'center', gap: 10,
              }}>
                <div style={{
                  flex: 1, height: 3, background: p.border, borderRadius: 100, overflow: 'hidden',
                }}>
                  <div style={{
                    height: '100%', width: `${readPct}%`, background: p.primary,
                    borderRadius: 100, transition: 'width 0.25s',
                  }} />
                </div>
                <span style={{
                  fontFamily: MONO, fontSize: 10.5, fontWeight: 600,
                  color: allRead ? p.primary : p.textMuted, letterSpacing: 0.6,
                  whiteSpace: 'nowrap',
                }}>
                  {read.length} / {SECTIONS.length} READ
                </span>
              </div>
            </div>

            {/* Sections list */}
            <div style={{
              flex: 1, overflow: 'auto',
              padding: '6px 22px 24px',
              maskImage: `linear-gradient(to bottom, black 0, black calc(100% - 24px), transparent 100%)`,
            }}>
              {/* Quick-summary banner — the TL;DR before the legalese */}
              <div style={{
                background: p.warnBg, border: `1px solid ${p.warnBorder}`,
                borderRadius: 14, padding: 14, marginBottom: 14,
                display: 'flex', gap: 12,
              }}>
                <div style={{
                  width: 28, height: 28, borderRadius: 8, flexShrink: 0,
                  background: p.warnBorder, color: p.warnText,
                  display: 'flex', alignItems: 'center', justifyContent: 'center',
                }}>
                  <AlertTri size={16} stroke={p.warnText} />
                </div>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 13, fontWeight: 700, color: p.warnText, marginBottom: 2 }}>
                    Short version
                  </div>
                  <div style={{ fontSize: 12.5, color: p.warnText, lineHeight: 1.5, opacity: 0.95 }}>
                    This app helps you <em>document</em> your preferences. It is <strong>not</strong> legal or medical advice. To be valid, your directive must be signed in front of <strong>two adult witnesses</strong>. Tap each section below to expand.
                  </div>
                </div>
              </div>

              {SECTIONS.map((s, i) => (
                <Section
                  key={s.n}
                  section={s}
                  expanded={open === i}
                  onToggle={() => toggle(i)}
                  index={i}
                  total={SECTIONS.length}
                />
              ))}

              <div style={{
                marginTop: 8, padding: '14px 4px 4px',
                fontFamily: SERIF, fontStyle: 'italic', fontSize: 16,
                color: p.textMuted, lineHeight: 1.45, textAlign: 'center',
              }}>
                "Your directive is your voice — written in advance, kept safe, honored when you can't speak for yourself."
                <div style={{ fontFamily: MONO, fontStyle: 'normal', fontSize: 10, marginTop: 8, letterSpacing: 0.6 }}>
                  — PA MHAD BOOKLET
                </div>
              </div>
            </div>

            {/* Sticky accept bar */}
            <div style={{
              background: p.card, borderTop: `1px solid ${p.border}`,
              padding: '14px 18px 28px',
              boxShadow: '0 -8px 24px rgba(0,0,0,0.04)',
            }}>
              {/* Two checkboxes, more honest than one */}
              <CheckRow
                checked={isAdult}
                onToggle={() => setIsAdult(!isAdult)}
                label={<>I'm <strong>18 or older</strong>, or an emancipated minor.</>}
              />
              <div style={{ height: 8 }} />
              <CheckRow
                checked={notLegal}
                onToggle={() => setNotLegal(!notLegal)}
                label={<>I understand this app is <strong>not legal or medical advice</strong>.</>}
              />

              <div style={{ height: 12 }} />

              <Btn
                kind={canContinue ? 'primary' : 'primary'}
                size="lg"
                full
                trailing={<Arrow size={18} stroke={canContinue ? p.onPrimary : p.textMuted} />}
                style={{
                  background: canContinue ? p.primary : p.border,
                  color: canContinue ? p.onPrimary : p.textMuted,
                  cursor: canContinue ? 'pointer' : 'not-allowed',
                  transition: 'all 0.2s',
                }}
              >
                I understand · Continue
              </Btn>

              <div style={{
                fontSize: 10.5, color: p.textMuted, textAlign: 'center',
                marginTop: 10, lineHeight: 1.45,
              }}>
                You can re-read this anytime from Settings → Legal.
              </div>
            </div>
          </div>
        </Screen>
      );
    }

    // ─── Custom checkbox row ─────────────────────────────────────────────
    function CheckRow({ checked, onToggle, label }) {
      const { palette: p } = React.useContext(MHADContext);
      return (
        <div
          onClick={onToggle}
          style={{
            display: 'flex', alignItems: 'flex-start', gap: 12,
            padding: '8px 4px', cursor: 'pointer',
            userSelect: 'none',
          }}
        >
          <div style={{
            width: 22, height: 22, borderRadius: 6, flexShrink: 0,
            background: checked ? p.primary : 'transparent',
            border: checked ? 'none' : `1.5px solid ${p.border}`,
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            marginTop: 1,
            transition: 'background 0.15s',
          }}>
            {checked && <Check size={14} stroke={p.onPrimary} sw={3} />}
          </div>
          <span style={{
            flex: 1, fontSize: 13.5, color: p.text, lineHeight: 1.45,
          }}>{label}</span>
        </div>
      );
    }

    // ─── App: render in iOS frame ────────────────────────────────────────
    function App() {
      const [palette, setPalette] = useState('teal');
      const [mode, setMode] = useState('light');
      const p = MHAD_PALETTES[palette][mode];

      return (
        <MHADContext.Provider value={{ palette: p, paletteName: palette, mode, density: 'comfortable' }}>
          {/* Picker rail at top */}
          <div style={{
            position: 'fixed', top: 16, left: 16, zIndex: 100,
            background: 'rgba(255,255,255,0.92)', backdropFilter: 'blur(10px)',
            border: '1px solid rgba(0,0,0,0.08)', borderRadius: 10, padding: 10,
            display: 'flex', gap: 14, fontFamily: 'DM Sans', fontSize: 12, alignItems: 'center',
            boxShadow: '0 4px 20px rgba(0,0,0,0.06)',
          }}>
            <div style={{ display: 'flex', gap: 4 }}>
              {[['teal', 'Teal'], ['navy', 'Navy'], ['sage', 'Sage']].map(([id, label]) => (
                <button key={id} onClick={() => setPalette(id)} style={{
                  border: 'none', cursor: 'pointer', borderRadius: 6,
                  padding: '5px 9px', fontSize: 11.5, fontWeight: 600,
                  background: palette === id ? MHAD_PALETTES[id].light.primary : 'transparent',
                  color: palette === id ? MHAD_PALETTES[id].light.onPrimary : '#5a5550',
                }}>{label}</button>
              ))}
            </div>
            <div style={{ width: 1, height: 18, background: 'rgba(0,0,0,0.1)' }} />
            <div style={{ display: 'flex', gap: 4 }}>
              {[['light', 'Light'], ['dark', 'Dark']].map(([id, label]) => (
                <button key={id} onClick={() => setMode(id)} style={{
                  border: 'none', cursor: 'pointer', borderRadius: 6,
                  padding: '5px 9px', fontSize: 11.5, fontWeight: 600,
                  background: mode === id ? '#29261b' : 'transparent',
                  color: mode === id ? '#fff' : '#5a5550',
                }}>{label}</button>
              ))}
            </div>
          </div>

          <IOSDevice width={422} height={894} dark={mode === 'dark'}>
            <DisclaimerScreen />
          </IOSDevice>

          {/* Hand annotation */}
          <div style={{
            maxWidth: 320, fontFamily: 'DM Sans', color: '#3a3530',
            paddingTop: 40,
          }}>
            <div style={{
              fontFamily: "'JetBrains Mono', monospace", fontSize: 11, letterSpacing: 1,
              color: '#7a7065', marginBottom: 8,
            }}>MHAD · INITIAL DISCLAIMER · v1</div>
            <h2 style={{
              fontFamily: "'Instrument Serif', serif", fontStyle: 'italic',
              fontSize: 32, fontWeight: 400, margin: '0 0 12px', letterSpacing: -0.5, lineHeight: 1.1,
            }}>The first thing someone sees.</h2>
            <p style={{ fontSize: 13.5, lineHeight: 1.55, color: '#5a5550', margin: '0 0 18px' }}>
              Eight legal sections, lifted verbatim from <code style={{ fontFamily: 'JetBrains Mono', fontSize: 12 }}>lib/ui/disclaimer/disclaimer_screen.dart</code> — but composed so it feels readable, not punitive.
            </p>

            <div style={{
              fontFamily: "'JetBrains Mono', monospace", fontSize: 10.5,
              color: '#7a7065', letterSpacing: 0.8, marginBottom: 8,
            }}>DESIGN MOVES</div>
            <ul style={{ fontSize: 13, lineHeight: 1.6, color: '#3a3530', paddingLeft: 18, margin: 0 }}>
              <li><strong>Short-version banner</strong> at top — the legalese in 25 words for anyone who'll bounce.</li>
              <li><strong>Accordion sections</strong> — eight bullets is too many flat; expand only what you want to read.</li>
              <li><strong>Read-progress meter</strong> — a quiet "X of 8 read" — no gate, but a nudge.</li>
              <li><strong>Two separate checkboxes</strong> — age + acknowledgment. Splitting them is more honest than the original combined sentence.</li>
              <li><strong>Continue button stays disabled</strong> until both are checked. Active state = primary teal.</li>
              <li><strong>988 link</strong> persists in the corner — never want to bury it on the gate screen.</li>
            </ul>

            <div style={{
              fontFamily: "'JetBrains Mono', monospace", fontSize: 10.5,
              color: '#7a7065', letterSpacing: 0.8, marginTop: 18, marginBottom: 8,
            }}>HANDOFF NOTES</div>
            <ul style={{ fontSize: 13, lineHeight: 1.6, color: '#3a3530', paddingLeft: 18, margin: 0 }}>
              <li>All copy is the existing Dart copy, reflowed — no new legal claims.</li>
              <li>Replaces the gate path in <code style={{ fontFamily: 'JetBrains Mono', fontSize: 12 }}>DisclaimerScreen.gate(...)</code>. The <code style={{ fontFamily: 'JetBrains Mono', fontSize: 12 }}>readOnly</code> variant in Settings can reuse the same accordion without the footer.</li>
              <li>Section data → a <code style={{ fontFamily: 'JetBrains Mono', fontSize: 12 }}>List&lt;_Section&gt;</code> constant; the existing <code style={{ fontFamily: 'JetBrains Mono', fontSize: 12 }}>_Section</code> widget becomes an <code style={{ fontFamily: 'JetBrains Mono', fontSize: 12 }}>ExpansionTile</code>-style row.</li>
              <li>Two-checkbox state means <code style={{ fontFamily: 'JetBrains Mono', fontSize: 12 }}>_isAdult &amp;&amp; _notLegalAdvice</code> for the button's <code style={{ fontFamily: 'JetBrains Mono', fontSize: 12 }}>onPressed</code>.</li>
            </ul>
          </div>
        </MHADContext.Provider>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
