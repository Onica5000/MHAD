<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <!-- Mobile viewport: without this, mobile browsers render at a ~980px
       virtual width (zoomed-out desktop view), which shrinks the bottom
       nav off-screen and trips the desktop layout breakpoint. device-width
       makes Flutter see the real phone width so the mobile layout + floating
       nav render correctly. -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Pennsylvania Mental Health Advance Directive - Create, manage, and export your mental health treatment preferences under PA Act 194.">

  <!--
    PWA install metadata (Chrome/Edge — the design pivot 2026-06-04
    locked the web target to Chrome/Edge browsers, so iOS Safari /
    `apple-mobile-web-app-*` tags were dropped). The W3C
    `mobile-web-app-capable` covers Android Chrome's "add to home
    screen" PWA install. Theme color and orientation live in
    manifest.json (theme_color = navy primary, orientation = any).
  -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#1E3A8A">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>PA Mental Health Advance Directive</title>
  <link rel="manifest" href="manifest.json">

  <!--
    Belt-and-suspenders service-worker cleanup. Flutter 3.41.4 already ships
    a self-unregistering SW stub (`flutter_service_worker.js`) — on activate
    it calls `registration.unregister()` and reloads every open tab onto the
    fresh build. This script adds a second cleanup pass that runs on every
    page load: it unregisters any SW still attached and clears the origin's
    Cache Storage. If Flutter ever changes the stub behavior in a future
    version, this snippet keeps the no-stale-SW guarantee.

    Runs early (before flutter_bootstrap.js) so cleanup is in flight while
    Flutter loads. Safe to ship: with no SW present this is a no-op.
  -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function (regs) {
        regs.forEach(function (r) { r.unregister(); });
      }).catch(function () { /* no SW or permission denied — ignore */ });
    }
    if ('caches' in window) {
      caches.keys().then(function (keys) {
        keys.forEach(function (k) { caches.delete(k); });
      }).catch(function () { /* ignore */ });
    }
  </script>
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
  <!-- Accessible privacy/legal links before app loads (GDPR/CCPA compliance) -->
  <noscript>
    <p style="text-align:center;padding:20px;font-family:sans-serif;">
      This app requires JavaScript to run.
    </p>
  </noscript>
  <div id="legal-footer" style="position:fixed;bottom:0;width:100%;text-align:center;padding:8px;font-size:11px;font-family:sans-serif;color:#666;background:#f5f5f5;z-index:9999;">
    Not a medical device. Not legal advice.
    &bull; <a href="#/privacy-policy" style="color:#00827F;">Privacy Policy</a>
    &bull; <a href="#/disclaimer" style="color:#00827F;">Legal Disclaimer</a>
    &bull; This app does not use cookies or tracking.
  </div>
  <script>
    // Hide the legal footer once the Flutter app loads
    window.addEventListener('flutter-first-frame', function() {
      var footer = document.getElementById('legal-footer');
      if (footer) footer.style.display = 'none';
    });
  </script>
</body>
</html>
