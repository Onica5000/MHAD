name: Deploy Web to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Build web
        # Flutter 3.41.4 already ships a self-unregistering service worker
        # stub: `flutter_service_worker.js` calls `registration.unregister()`
        # on activate and reloads every open tab onto the fresh build. So
        # there is no longer a "stale SW pinning users to the previous
        # deploy" problem to solve at the build flag level. The defensive
        # unregister snippet in `web/index.html` provides belt-and-suspenders
        # cleanup if Flutter ever changes the stub behavior.
        # (The `--pwa-strategy=none` flag was removed from `flutter build web`
        # in 4.x; in 3.41 it is silently ignored, so we omit it for clarity.)
        run: flutter build web --release --base-href "/MHAD/"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
