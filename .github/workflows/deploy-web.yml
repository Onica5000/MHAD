name: Deploy Web to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

# All actions below are pinned to versions that run natively on Node 24, so
# the previous `FORCE_JAVASCRIPT_ACTIONS_TO_NODE24` workaround (which forced
# Node-20 actions onto Node 24 and produced the deprecation warning) is no
# longer needed and has been removed.

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      # ── Quality gates (block the deploy if they fail) ──────────────────
      # Previously CI only built+deployed web, so `flutter test` never ran in
      # CI and tests could rot without blocking a deploy. These steps make
      # analyze + the test suite a hard gate before the build/deploy. They run
      # on the pinned 3.41.4 toolchain, so they also catch local↔CI skew that a
      # local (3.44.x) run would miss.
      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build web
        # `--pwa-strategy=none` makes Flutter generate a flutter_bootstrap.js
        # that registers NO service worker (verified honored on 3.41.4: the
        # generated bootstrap calls `_flutter.loader.load()` with no
        # serviceWorkerSettings, and the app boots normally). This is the
        # supported way to disable the SW — do NOT hand-write a custom
        # web/flutter_bootstrap.js for this; a hand-written one broke the boot
        # (load() threw before requesting main.dart.js → blank screen).
        #
        # Why no SW at all: the default SW serves the cached app shell
        # (index.html + main.dart.js) cache-first, and with hash routing
        # in-app navigation never triggers an SW update check, so an old build
        # can pin users for days — a refresh does not fix it. With no SW the
        # app is always fetched from the network (only the 10-min GitHub Pages
        # HTTP cache applies), so deploys appear on the next load. The cleanup
        # snippet in web/index.html unregisters any SW left from earlier visits.
        # --source-maps: emit main.dart.js.map so runtime errors in the browser
        # console resolve to real Dart file:line (the repo is public, so the
        # source is already visible). Helps debug production-only runtime crashes
        # that build/analyze/unit-tests can't catch.
        run: flutter build web --release --base-href "/MHAD/" --pwa-strategy=none --source-maps

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: build/web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
