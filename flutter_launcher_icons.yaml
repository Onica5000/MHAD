# flutter_launcher_icons configuration
# Run: flutter pub run flutter_launcher_icons
#
# Replace assets/icon/icon.png with a 1024x1024 PNG of your actual app icon.
# The icon should use the teal color scheme (approx. #006B6B) and clearly
# represent a mental health advance directive (e.g., a document with a heart).

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#006B6B"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"
  web:
    generate: false
  windows:
    generate: false
  macos:
    generate: false
