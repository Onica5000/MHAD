# codemagic.yaml — CI/CD for PA MHAD
# https://docs.codemagic.io/yaml-quick-start/building-a-flutter-app/

workflows:

  # ─── Tests (every push) ────────────────────────────────────────────────────
  tests:
    name: Tests
    max_build_duration: 15
    instance_type: mac_mini_m2
    environment:
      flutter: 3.41.4
    triggering:
      events:
        - push
        - pull_request
    scripts:
      - name: Get dependencies
        script: flutter pub get
      - name: Analyze
        script: flutter analyze --no-fatal-infos
      - name: Run tests
        script: flutter test

  # ─── Build All Platforms ───────────────────────────────────────────────────
  build-all:
    name: Build All Platforms
    max_build_duration: 90
    instance_type: mac_mini_m2
    environment:
      flutter: 3.41.4
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - tag
        - push
      tag_patterns:
        - pattern: 'v*'
      branch_patterns:
        - pattern: 'release/*'
    scripts:
      - name: Get dependencies
        script: flutter pub get

      - name: Run tests
        script: flutter test

      - name: Build Android APK
        script: flutter build apk --debug

      - name: Build iOS (verification — no codesign)
        script: flutter build ios --no-codesign

      - name: Build macOS
        script: flutter build macos --debug

      - name: Build Web
        script: flutter build web

      # Windows cannot build on macOS — build locally with:
      #   flutter build windows --release

    artifacts:
      - build/app/outputs/flutter-apk/app-debug.apk
      - build/macos/Build/Products/Debug/**/*.app
      - build/web/**
